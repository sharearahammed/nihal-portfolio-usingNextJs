<svg width="340" height="80" viewBox="0 0 340 80" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>S.A. Nihal Logo</title>
  <g transform="translate(170, 40)">

    <!-- Left bracket -->
    <path d="M -148 -28 L -158 -28 L -158 28 L -148 28"
      fill="none" stroke="#F97316" stroke-width="3"
      stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Right bracket -->
    <path d="M 148 -28 L 158 -28 L 158 28 L 148 28"
      fill="none" stroke="#F97316" stroke-width="3"
      stroke-linecap="round" stroke-linejoin="round"/>

    <!-- S -->
    <text x="-90" y="0"
      text-anchor="middle" dominant-baseline="middle"
      font-family="'Syne','Segoe UI',sans-serif"
      font-size="52" font-weight="700"
      fill="#999" letter-spacing="-2">S</text>

    <!-- dot after S -->
    <circle cx="-38" cy="8" r="4" fill="#F97316"/>

    <!-- A -->
    <text x="14" y="0"
      text-anchor="middle" dominant-baseline="middle"
      font-family="'Syne','Segoe UI',sans-serif"
      font-size="52" font-weight="700"
      fill="#F97316" letter-spacing="-2">A</text>

    <!-- dot after A -->
    <circle cx="55" cy="8" r="4" fill="#F97316"/>

    <!-- NIHAL -->
    <text x="116" y="0"
      text-anchor="middle" dominant-baseline="middle"
      font-family="'Syne','Segoe UI',sans-serif"
      font-size="20" font-weight="700"
      fill="#999" letter-spacing="5">NIHAL</text>

  </g>
</svg>